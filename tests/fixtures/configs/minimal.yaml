# Minimal test config
names:
  project: test-minimal
  workspace: workspace
  user: appuser

stages:
  base:
    from: python:3.11-slim
    steps:
      - {create: user,}

  development:
    from: base
    steps:
      - {become: user,}

  production:
    from: base
    steps:
      - {become: user}
      - copy: workspace
