# Minimal test config
project:
  name: test-minimal
  workspace: workspace

runtime:
  backend: auto
  privileged: false
  features: []

stages:
  base:
    from: python:3.11-slim
    steps:
      - {create_user: appuser,}

  development:
    from: base
    steps:
      - {become: appuser,}

  production:
    from: base
    steps:
      - {become: appuser}
      - copy: workspace
