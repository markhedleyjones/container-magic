names:
  image: test-cloud-tool
  workspace: workspace
  user: appuser

assets:
  - awscli.zip: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip

runtime:
  features:
    - aws_credentials

stages:
  base:
    from: debian:bookworm-slim
    steps:
      - apt-get: {install: [unzip, curl]}
      - {env: {TZ: UTC},}

  development:
    from: base

  production:
    from: base
    steps:
      - copy: workspace
