# Backward compatibility: explicit create/become steps still work
names:
  image: test-explicit-user
  workspace: workspace
  user: appuser

stages:
  base:
    from: debian:bookworm-slim
    steps:
      - {create: user}
      - {become: user,}

  development:
    from: base

  production:
    from: base
    steps:
      - {become: user}
      - copy: workspace
