# Test config with project-level assets (new syntax)
project:
  name: test-assets
  workspace: workspace
  assets:
    - https://httpbin.org/uuid
    - test-model.bin: https://example.com/download?file=model&v=2

stages:
  base:
    from: python:3-slim
    steps:
      - pip: {install: [requests]}
      - {env: {MODEL_PATH: /models}}
      - {create_user: modeluser}
      - copy: uuid /models/uuid.json
      - copy: test-model.bin /models/model.bin

  development:
    from: base

  production:
    from: base
