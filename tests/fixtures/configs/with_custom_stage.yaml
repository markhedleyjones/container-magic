# Test config with custom stage
project:
  name: test-custom-stage
  workspace: workspace

user:
  production:
    name: appuser
    uid: 1000
    gid: 1000

runtime:
  backend: auto
  privileged: false
  features: []

stages:
  base:
    from: python:3.11-slim

  development:
    from: base

  testing:
    from: base
    steps:
      - pip: {install: [pytest]}

  production:
    from: base
