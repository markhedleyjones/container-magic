# Config with pip steps to validate venv injection passes linters
names:
  image: test-pip-venv
  workspace: workspace
  user: appuser

stages:
  base:
    from: python:3.11-slim
    steps:
      - apt-get: {install: [curl]}
      - pip: {install: [requests, flask]}
      - {create: user}
      - {become: user,}

  development:
    from: base
    steps:
      - {become: user}
      - pip: {install: [pytest]}

  production:
    from: base
    steps:
      - {become: user}
      - copy: workspace
