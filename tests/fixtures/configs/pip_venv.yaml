names:
  image: test-pip-venv
  workspace: workspace
  user: appuser

stages:
  base:
    from: debian:bookworm-slim
    steps:
      - apt-get: {install: [curl]}
      - pip: {install: [requests, flask]}

  development:
    from: base
    steps:
      - pip: {install: [pytest]}

  production:
    from: base
    steps:
      - copy: workspace
