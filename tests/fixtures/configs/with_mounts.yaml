# Test config with additional volumes and devices
names:
  image: test-mounts
  workspace: workspace
  user: root

runtime:
  features:
    - display
  volumes:
    - /tmp/test-data:/data:ro
    - /var/log/app:/logs
  devices:
    - /dev/ttyUSB0

stages:
  base:
    from: python:3-slim
    steps:
      - apt-get: {install: [curl]}

  development:
    from: base

  production:
    from: base
