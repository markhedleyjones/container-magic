# Test config with GPU and audio features
names:
  project: test-gpu-audio
  workspace: workspace
  user: root

runtime:
  backend: auto
  privileged: true
  features:
    - gpu
    - audio
    - display

stages:
  base:
    from: pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime
    steps:
      - apt-get: {install: [ffmpeg, libsndfile1]}
      - pip: {install: [numpy, torch]}

  development:
    from: base

  production:
    from: base
