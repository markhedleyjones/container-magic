names:
  image: test-env-vars
  workspace: workspace
  user: appuser

stages:
  base:
    from: debian:bookworm-slim
    steps:
      - env:
          DATABASE_URL: postgresql://localhost/mydb
          API_KEY: test-key-123
          LOG_LEVEL: debug

  development:
    from: base
    steps:
      - {env: {DEBUG: "true"},}

  production:
    from: base
    steps:
      - {env: {DEBUG: "false"},}

commands:
  env-check:
    command: "env | grep -E '(DATABASE_URL|API_KEY|LOG_LEVEL)'"
    description: "Check environment variables"
