# Test config with environment variables
project:
  name: test-env-vars
  workspace: workspace

runtime:
  backend: auto
  privileged: false
  features: []

stages:
  base:
    from: ubuntu:22.04
    steps:
      - apt-get: {install: [python3, python3-pip]}
      - env:
          DATABASE_URL: postgresql://localhost/mydb
          API_KEY: test-key-123
          LOG_LEVEL: debug
      - {create_user: appuser,}

  development:
    from: base
    steps:
      - {env: {DEBUG: "true"}}
      - {become: appuser,}

  production:
    from: base
    steps:
      - {env: {DEBUG: "false"}}
      - {become: appuser,}

commands:
  env-check:
    command: "env | grep -E '(DATABASE_URL|API_KEY|LOG_LEVEL)'"
    description: "Check environment variables"
