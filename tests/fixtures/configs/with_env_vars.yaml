# Test config with environment variables
names:
  image: test-env-vars
  workspace: workspace
  user: appuser

stages:
  base:
    from: python:3-slim
    steps:
      - env:
          DATABASE_URL: postgresql://localhost/mydb
          API_KEY: test-key-123
          LOG_LEVEL: debug
      - {create: user,}

  development:
    from: base
    steps:
      - {env: {DEBUG: "true"}}
      - {become: user,}

  production:
    from: base
    steps:
      - {env: {DEBUG: "false"}}
      - {become: user,}

commands:
  env-check:
    command: "env | grep -E '(DATABASE_URL|API_KEY|LOG_LEVEL)'"
    description: "Check environment variables"
